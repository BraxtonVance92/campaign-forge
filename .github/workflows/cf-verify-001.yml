name: CF-VERIFY-001 GMI Live Test

# Manually triggered only. Never runs on push, pull_request, schedule, or any
# other automatic event. Per docs/ops/ACTIVE_WORK_PACKET.md (CF-VERIFY-001),
# Claude Code is authorized to prepare and push this file, but is NOT
# authorized to trigger it or add the GMI_API_KEY secret. A human with
# repository write access must add the secret and click "Run workflow".
#
# SECURITY: destination endpoints are hardcoded, not dispatch inputs. GMI's
# own quickstart docs show BOTH the voice-clone and avatar models are invoked
# through the identical endpoint below (verified 2026-07-21):
#   https://docs.gmicloud.ai/model-quickstarts/audio/minimax-audio-voice-clone-speech-2-6-hd
#   https://docs.gmicloud.ai/model-quickstarts/video/heygen-avatar-4.md
# Both pages show: POST https://console.gmicloud.ai/api/v1/ie/requestqueue/apikey/requests
# A runtime hostname allowlist check (exact match, no substring/suffix logic)
# additionally refuses to attach the Authorization header to any URL whose
# host is not exactly console.gmicloud.ai, as defense in depth against a
# future accidental edit reintroducing a variable endpoint.
#
# COST: exactly one voice-clone request and one avatar request, no retries
# of the paid action itself (the bounded status-polling loop below only
# re-checks the status of the SAME request_id already submitted -- it does
# not resubmit or repeat the paid call), no user-editable text/duration.
#
# The real spending boundary is the GMI account's prepaid credit balance,
# capped at a $20 maximum -- not a soft in-code reminder. GMI's own public
# sources disagree on the avatar model's billing basis (the gmicloud.ai
# blog says "$0.0667 per request"; the docs.gmicloud.ai quickstart page for
# the same model says "$0.0667/sec"), and the voice-clone model's price is
# not published on any official static page at all (only an unverified
# ~$0.10/request search-engine synthesis exists). Rather than resolve that
# ambiguity with a precise but potentially wrong in-code dollar ceiling,
# the account is funded with at most $20 in prepaid credit -- neither call
# can ever draw more than that regardless of which pricing interpretation
# turns out to be correct, because there is no more money in the account.
# If GMI requires more than $20 to fund the account at all (e.g. a higher
# minimum top-up), that is a blocker to report, not a reason to fund more
# than $20 without further authorization. If either response includes real
# cost/usage data, it is logged as actual, separate from any estimate.
#
# SECRET HYGIENE: the workflow never prints the raw response body. Only an
# explicit allowlist of fields is extracted and logged: request_id, model,
# status, timestamps, a derived output_type, and, if a media URL is
# present, its scheme+host+path with the query string stripped (signed
# URLs often carry time-limited access tokens in the query string, which
# are treated with the same care as a credential). GMI_API_KEY itself is
# only ever read via secrets.GMI_API_KEY inside an env: binding for the one
# step that needs it, never echoed, never traced (no `set -x`).
#
# TEST CLIP: Test 1 needs a short (<8s), non-personal reference clip to
# clone. Rather than ask a human to locate/host one, this workflow
# generates a short synthetic speech clip on the runner itself (espeak-ng,
# preinstalled tooling only) and publishes it to a throwaway, anonymous,
# unauthenticated public host (0x0.st) purely so GMI's servers can fetch
# it by URL -- no personal audio, no manual hosting step. This specific
# step (synthesis + anonymous upload) was designed carefully but has not
# been exercised end-to-end before this review, since no live run has
# occurred; if the anonymous host is unavailable at run time, Test 1
# reports that blocker plainly rather than silently failing or
# substituting an untested workaround.
#
# KNOWN LIMITATION, stated plainly: heygen_avatar_id and heygen_voice_id
# below are GMI's own documented example values, not independently
# confirmed to be valid/available on this account. If they are wrong, the
# call fails cheaply (likely a 4xx with no generation performed) rather
# than silently producing a false result.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RUN to confirm you accept this run''s cost. The real spending boundary is a $20 maximum prepaid GMI credit balance, not an in-code number -- see header comment.'
        required: true
        default: ''
      run_voice_test:
        description: 'Run Test 1: GMI voice-clone connectivity (fixed call, worst-case $1.00)'
        type: boolean
        default: true
      run_avatar_test:
        description: 'Run Test 2: GMI real avatar request to determine downloadable-file vs. WebRTC-only output (fixed call, worst-case $0.20)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cf-verify-001-gmi-live-test
  cancel-in-progress: false

env:
  # Single hardcoded, verified endpoint used by both tests. Not a dispatch
  # input -- see the security note above.
  GMI_REQUEST_ENDPOINT: https://console.gmicloud.ai/api/v1/ie/requestqueue/apikey/requests
  GMI_ALLOWED_HOST: console.gmicloud.ai

jobs:
  gmi-live-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Guard - require explicit confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "RUN" ]; then
            echo "::error::Confirmation input must be exactly 'RUN'. Aborting before any API call or secret access."
            exit 1
          fi

      - name: Guard - require GMI_API_KEY secret to be configured
        env:
          GMI_API_KEY: ${{ secrets.GMI_API_KEY }}
        run: |
          if [ -z "$GMI_API_KEY" ]; then
            echo "::error::GMI_API_KEY repository secret is not set. Add it under Settings > Secrets and variables > Actions, then re-run."
            exit 1
          fi
          echo "GMI_API_KEY is present (length: ${#GMI_API_KEY} characters). Its value is never printed by this workflow."

      - name: Set up Python
        if: ${{ github.event.inputs.run_voice_test == 'true' || github.event.inputs.run_avatar_test == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: ${{ github.event.inputs.run_voice_test == 'true' || github.event.inputs.run_avatar_test == 'true' }}
        run: pip install requests

      - name: Generate predetermined synthetic reference clip (Test 1 only)
        id: synth
        if: ${{ github.event.inputs.run_voice_test == 'true' }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq espeak-ng >/dev/null
          espeak-ng "This is a synthetic connectivity test. No real person's voice is used." -w /tmp/cf_verify_raw.wav
          # Hard-cap duration well under the model's documented 8-second limit,
          # and normalize to a broadly-accepted format/sample rate.
          ffmpeg -y -i /tmp/cf_verify_raw.wav -t 7 -ar 22050 -ac 1 /tmp/cf_verify_clip.wav -loglevel error
          echo "Synthetic clip generated (non-personal, espeak-ng TTS output)."
          UPLOAD_URL=$(curl -s -F "file=@/tmp/cf_verify_clip.wav" https://0x0.st || true)
          if [[ "$UPLOAD_URL" =~ ^https:// ]]; then
            echo "clip_url=$UPLOAD_URL" >> "$GITHUB_OUTPUT"
            echo "Synthetic clip published to a throwaway anonymous host for GMI to fetch."
          else
            echo "clip_url=" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not obtain a public URL for the synthetic clip from the anonymous host. Test 1 will report this as a blocker rather than proceed with an unverified URL."
          fi

      - name: Test 1 - GMI voice clone (MiniMax speech-2.6-hd)
        if: ${{ github.event.inputs.run_voice_test == 'true' }}
        env:
          GMI_API_KEY: ${{ secrets.GMI_API_KEY }}
          SOURCE_AUDIO_URL: ${{ steps.synth.outputs.clip_url }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, time
          from urllib.parse import urlparse
          import requests

          key = os.environ["GMI_API_KEY"]
          endpoint = os.environ["GMI_REQUEST_ENDPOINT"]
          allowed_host = os.environ["GMI_ALLOWED_HOST"]
          source_audio_url = os.environ.get("SOURCE_AUDIO_URL", "").strip()

          lines = ["## CF-VERIFY-001 -- Test 1: GMI voice clone (MiniMax speech-2.6-hd)", ""]

          def fail_summary(msg):
              lines.append(msg)
              print("\n".join(lines))
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("\n".join(lines) + "\n")

          # Defense in depth: never send the secret anywhere but the exact allowed host,
          # even though the endpoint is hardcoded above, not a dispatch input.
          if urlparse(endpoint).hostname != allowed_host:
              fail_summary(f"ABORTED: endpoint host '{urlparse(endpoint).hostname}' does not "
                            f"match the allowlisted host '{allowed_host}'. The secret was never sent.")
              sys.exit(1)

          if not source_audio_url:
              fail_summary(
                  "BLOCKED: no synthetic reference clip URL was available (the anonymous "
                  "upload host may have been unreachable). No API call was made; no charge "
                  "was incurred. Re-run once the upload step succeeds, or supply a real "
                  "public HTTPS URL to a short non-personal clip via a follow-up revision."
              )
              sys.exit(0)

          def safe_url_meta(u):
              try:
                  p = urlparse(u)
                  return f"{p.scheme}://{p.netloc}{p.path} (query string stripped)"
              except Exception:
                  return "(unparseable URL, omitted)"

          def sanitize(body):
              out = {}
              for k in ("request_id", "model", "status", "created_at", "updated_at", "queued_at"):
                  if k in body:
                      out[k] = body[k]
              outcome = body.get("outcome") or {}
              media = outcome.get("media_urls") or []
              if isinstance(media, list) and media:
                  out["output_type"] = "downloadable_media_file"
                  metas = []
                  for m in media[:3]:
                      url_val = m.get("url") if isinstance(m, dict) else m
                      metas.append(safe_url_meta(url_val))
                  out["media_url_meta"] = metas
              else:
                  session_like = [k for k in body.keys()
                                  if any(t in k.lower() for t in ("session", "stream", "webrtc", "offer", "socket"))]
                  if session_like:
                      out["output_type"] = "possible_streaming_session"
                      out["session_like_fields_present"] = session_like
                  else:
                      out["output_type"] = "undetermined"
              return out

          payload = {
              "model": "minimax-audio-voice-clone-speech-2.6-hd",
              "payload": {
                  "text": "This is a connectivity test for CampaignForge verification.",
                  "source_audio": source_audio_url,
              },
          }
          headers = {"Authorization": f"Bearer {key}", "Content-Type": "application/json"}

          start = time.time()
          try:
              resp = requests.post(endpoint, headers=headers, json=payload, timeout=30)
          except requests.RequestException as e:
              fail_summary(f"EXCEPTION submitting request: {type(e).__name__}: {e}\n"
                           "If the request never reached GMI, no charge should have occurred -- verify in the GMI console.")
              sys.exit(1)

          try:
              body = resp.json()
          except ValueError:
              lines.append(f"HTTP status: {resp.status_code}")
              lines.append(f"Non-JSON response ({len(resp.content)} bytes) -- not printed raw. "
                           "Cannot extract request_id; skipping status polling.")
              print("\n".join(lines))
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("\n".join(lines) + "\n")
              sys.exit(0)

          request_id = body.get("request_id")
          lines.append(f"Submit HTTP status: {resp.status_code}")
          lines.append(f"request_id: {request_id}")
          lines.append(f"model: {body.get('model')}")
          lines.append(f"initial status: {body.get('status')}")

          final = dict(body)
          if request_id:
              status_url = f"{endpoint}/{request_id}"
              if urlparse(status_url).hostname != allowed_host:
                  lines.append("Skipping status polling: constructed status URL failed the host allowlist check.")
              else:
                  for attempt in range(24):  # up to ~2 minutes
                      time.sleep(5)
                      try:
                          poll = requests.get(status_url, headers=headers, timeout=15)
                          pbody = poll.json()
                      except (requests.RequestException, ValueError):
                          continue
                      final = pbody
                      st = pbody.get("status")
                      if st in ("success", "failed", "error"):
                          break

          elapsed = time.time() - start
          sanitized = sanitize(final)
          lines.append(f"\nTotal elapsed (submit to terminal or timeout): {elapsed:.1f}s")
          lines.append("Sanitized result fields (raw body never logged):")
          lines.append("```json")
          lines.append(json.dumps(sanitized, indent=2))
          lines.append("```")
          lines.append(
              "\nActual cost: not returned in this response (REPORTED estimate ~$0.10/request, "
              "not independently verified on an official static page). The real spending "
              "boundary for this call is the $20 maximum prepaid GMI account balance, not an "
              "in-code estimate. Verify the real charge in the GMI console and record it in "
              "docs/verification/CF-VERIFY-001.md."
          )

          print("\n".join(lines))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

      - name: Test 2 - GMI real avatar request (downloadable file vs. WebRTC-only)
        if: ${{ github.event.inputs.run_avatar_test == 'true' }}
        env:
          GMI_API_KEY: ${{ secrets.GMI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, time
          from urllib.parse import urlparse
          import requests

          key = os.environ["GMI_API_KEY"]
          endpoint = os.environ["GMI_REQUEST_ENDPOINT"]
          allowed_host = os.environ["GMI_ALLOWED_HOST"]

          lines = ["## CF-VERIFY-001 -- Test 2: GMI avatar request (heygen-avatar-4)", ""]

          def fail_summary(msg):
              lines.append(msg)
              print("\n".join(lines))
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("\n".join(lines) + "\n")

          if urlparse(endpoint).hostname != allowed_host:
              fail_summary(f"ABORTED: endpoint host '{urlparse(endpoint).hostname}' does not "
                            f"match the allowlisted host '{allowed_host}'. The secret was never sent.")
              sys.exit(1)

          def safe_url_meta(u):
              try:
                  p = urlparse(u)
                  return f"{p.scheme}://{p.netloc}{p.path} (query string stripped)"
              except Exception:
                  return "(unparseable URL, omitted)"

          def sanitize(body):
              out = {}
              for k in ("request_id", "model", "status", "created_at", "updated_at", "queued_at"):
                  if k in body:
                      out[k] = body[k]
              outcome = body.get("outcome") or {}
              media = outcome.get("media_urls") or []
              if isinstance(media, list) and media:
                  out["output_type"] = "downloadable_media_file"
                  metas = []
                  for m in media[:3]:
                      url_val = m.get("url") if isinstance(m, dict) else m
                      metas.append(safe_url_meta(url_val))
                  out["media_url_meta"] = metas
              else:
                  session_like = [k for k in body.keys()
                                  if any(t in k.lower() for t in ("session", "stream", "webrtc", "offer", "socket"))]
                  if session_like:
                      out["output_type"] = "possible_streaming_session"
                      out["session_like_fields_present"] = session_like
                  else:
                      out["output_type"] = "undetermined"
              return out

          # avatar_id and voice_id below are GMI's own documented example values
          # (docs.gmicloud.ai/model-quickstarts/video/heygen-avatar-4.md), not
          # independently confirmed valid for this account. input_text is the
          # shortest sensible phrase (a two-character greeting) to minimize
          # generated duration -- and therefore cost -- regardless of which
          # of GMI's two conflicting billing-basis statements (flat per-request
          # vs. per-second) turns out to be correct.
          payload = {
              "model": "heygen-avatar-4",
              "payload": {
                  "avatar_id": "Abigail_expressive_2024112501",
                  "avatar_style": "normal",
                  "input_text": "Hi.",
                  "voice_id": "2d5b0e6cf36f460aa7fc47e3eee4ba54",
                  "speed": 1.0,
              },
          }
          headers = {"Authorization": f"Bearer {key}", "Content-Type": "application/json"}

          start = time.time()
          try:
              resp = requests.post(endpoint, headers=headers, json=payload, timeout=30)
          except requests.RequestException as e:
              fail_summary(f"EXCEPTION submitting request: {type(e).__name__}: {e}\n"
                           "If the request never reached GMI, no charge should have occurred -- verify in the GMI console.")
              sys.exit(1)

          try:
              body = resp.json()
          except ValueError:
              lines.append(f"HTTP status: {resp.status_code}")
              lines.append(f"Non-JSON response ({len(resp.content)} bytes) -- not printed raw. "
                           "Cannot extract request_id; skipping status polling.")
              print("\n".join(lines))
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("\n".join(lines) + "\n")
              sys.exit(0)

          request_id = body.get("request_id")
          lines.append(f"Submit HTTP status: {resp.status_code}")
          lines.append(f"request_id: {request_id}")
          lines.append(f"model: {body.get('model')}")
          lines.append(f"initial status: {body.get('status')}")

          final = dict(body)
          if request_id:
              status_url = f"{endpoint}/{request_id}"
              if urlparse(status_url).hostname != allowed_host:
                  lines.append("Skipping status polling: constructed status URL failed the host allowlist check.")
              else:
                  for attempt in range(36):  # up to ~3 minutes
                      time.sleep(5)
                      try:
                          poll = requests.get(status_url, headers=headers, timeout=15)
                          pbody = poll.json()
                      except (requests.RequestException, ValueError):
                          continue
                      final = pbody
                      st = pbody.get("status")
                      if st in ("success", "failed", "error"):
                          break

          elapsed = time.time() - start
          sanitized = sanitize(final)
          lines.append(f"\nTotal elapsed (submit to terminal or timeout): {elapsed:.1f}s")
          lines.append("Sanitized result fields (raw body never logged):")
          lines.append("```json")
          lines.append(json.dumps(sanitized, indent=2))
          lines.append("```")
          lines.append(
              "\nThis is the authoritative answer to CF-VERIFY-001's avatar question: "
              "output_type above is 'downloadable_media_file' if GMI returned a file URL, "
              "'possible_streaming_session' if it returned session/stream-like fields "
              "instead, or 'undetermined' if neither pattern matched -- in which case the "
              "sanitized fields still capture status and request_id for follow-up."
          )
          lines.append(
              "\nActual cost: not returned in this response. GMI's own published sources "
              "disagree on this model's billing basis (flat per-request per the gmicloud.ai "
              "blog vs. per-second per the docs.gmicloud.ai quickstart page for this exact "
              "model) -- input_text was kept to the shortest sensible phrase precisely "
              "because of that unresolved discrepancy. The real spending boundary for this "
              "call is the $20 maximum prepaid GMI account balance, not an in-code estimate. "
              "Verify the real charge in the GMI console and record it in "
              "docs/verification/CF-VERIFY-001.md."
          )

          print("\n".join(lines))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

      - name: Documented spending boundary
        if: always()
        run: |
          {
            echo "## The real spending boundary"
            echo "Both calls are single, fixed, hardcoded requests -- no retries of the paid action (status polling only re-checks the same request_id, it never resubmits), no user-editable text, duration, or destination. The actual spending boundary is the GMI account's prepaid credit balance, capped at a documented **\$20 maximum** -- not an in-code dollar ceiling. Neither call can draw more than what is actually funded in the account, regardless of GMI's own conflicting published pricing statements for the avatar model (flat per-request vs. per-second) or the unverified voice-clone price. Verify actual charges in the GMI console after this run and record them, call-by-call, in docs/verification/CF-VERIFY-001.md."
          } >> "$GITHUB_STEP_SUMMARY"
